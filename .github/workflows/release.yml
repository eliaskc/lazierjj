name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch | minor | major | x.y.z). Leave empty to let the agent decide."
        required: false
        default: ""
      model:
        description: "pi model id (provider/model[:thinking]). Defaults to claude-sonnet-4-6 — top prose quality + adaptive reasoning. Alternatives: opencode/kimi-k2.5 (cheap), opencode/gpt-5.4-mini (fast)."
        required: false
        default: "opencode/claude-sonnet-4-6"
      pi_version:
        description: "Pin a specific @mariozechner/pi-coding-agent version (default: latest)"
        required: false
        default: "latest"
  pull_request:
    types: [closed]
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Manual trigger: run pi to write CHANGELOG.md + bump package.json,
  # then open a PR. Maintainer reviews and merges.
  # ---------------------------------------------------------------------------
  draft-release-pr:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install pi
        run: |
          if [[ "${{ inputs.pi_version }}" == "latest" ]]; then
            npm install -g @mariozechner/pi-coding-agent
          else
            npm install -g @mariozechner/pi-coding-agent@${{ inputs.pi_version }}
          fi
          pi --version

      - name: Capture pre-state
        id: pre
        run: |
          echo "old_version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
          echo "old_changelog_sha=$(sha256sum CHANGELOG.md | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Run pi to generate changelog and bump version
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PI_OFFLINE: "0"
        run: |
          set -euo pipefail
          # Pass the bump arg as positional ($1) to the prompt template.
          # Quoted so an empty bump arrives as an empty string and the prompt
          # treats it as "agent decides".
          pi -p \
            --model "${{ inputs.model }}" \
            --tools read,bash,edit,write,grep,find,ls \
            --no-skills \
            --no-context-files \
            --no-extensions \
            --no-session \
            @.github/workflows/release-notes-prompt.md "${{ inputs.bump }}"

      - name: Verify pi did its job
        id: post
        run: |
          set -euo pipefail
          NEW_VERSION=$(jq -r .version package.json)
          OLD_VERSION="${{ steps.pre.outputs.old_version }}"
          NEW_CHANGELOG_SHA=$(sha256sum CHANGELOG.md | cut -d' ' -f1)
          OLD_CHANGELOG_SHA="${{ steps.pre.outputs.old_changelog_sha }}"

          if [[ "$NEW_VERSION" == "$OLD_VERSION" ]]; then
            echo "::error::Agent did not bump version in package.json (still $OLD_VERSION)"
            exit 1
          fi

          if [[ "$NEW_CHANGELOG_SHA" == "$OLD_CHANGELOG_SHA" ]]; then
            echo "::error::Agent did not update CHANGELOG.md"
            exit 1
          fi

          if ! grep -q "^## ${NEW_VERSION}\$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a section for ${NEW_VERSION}"
            exit 1
          fi

          # Make sure the agent didn't accidentally touch other files.
          UNEXPECTED=$(git status --porcelain | awk '{print $2}' \
            | grep -vE '^(package\.json|CHANGELOG\.md)$' || true)
          if [[ -n "$UNEXPECTED" ]]; then
            echo "::warning::Agent modified unexpected files:"
            echo "$UNEXPECTED"
            # Revert anything outside the allowlist so the PR stays scoped.
            for f in $UNEXPECTED; do
              git checkout -- "$f" 2>/dev/null || rm -f "$f"
            done
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show diff
        run: |
          echo "::group::package.json diff"
          git --no-pager diff -- package.json || true
          echo "::endgroup::"
          echo "::group::CHANGELOG.md diff"
          git --no-pager diff -- CHANGELOG.md || true
          echo "::endgroup::"

      - name: Extract release notes for PR body
        id: notes
        run: |
          set -euo pipefail
          NOTES=$(bun run script/extract-release-notes.ts "${{ steps.post.outputs.version }}")
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open release PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.post.outputs.version }}
          delete-branch: true
          commit-message: "release: v${{ steps.post.outputs.version }}"
          title: "release: v${{ steps.post.outputs.version }}"
          labels: release
          body: |
            Auto-generated release PR for **v${{ steps.post.outputs.version }}**.

            - Generated by `pi` using model `${{ inputs.model }}`
            - Bump input: `${{ inputs.bump || '(agent-decided)' }}`
            - Triggered by @${{ github.actor }}

            ---

            ${{ steps.notes.outputs.notes }}

            ---

            **Merge this PR to publish.** On merge with the `release` label, a single workflow run will:
            1. Tag `v${{ steps.post.outputs.version }}` at the merge commit
            2. Build binaries for darwin-{arm64,x64} and linux-{x64,arm64} on native runners
            3. Publish all 5 npm packages (`kajji` + 4 platform packages)
            4. Create the GitHub release with these notes and binary archives

  # ---------------------------------------------------------------------------
  # When the release PR is merged: tag the merge commit and push the tag.
  #
  # NOTE: the tag is pushed using GITHUB_TOKEN, which by design does NOT
  # re-trigger workflows (anti-loop guard). So we cannot rely on the
  # `push: tags` trigger to fan out into build/publish here — instead, build
  # and publish are chained as `needs: tag-on-merge` so everything runs in the
  # same workflow run. The `push: tags` trigger is kept as an escape hatch for
  # manual tag pushes from a developer's machine (which DO trigger workflows).
  # ---------------------------------------------------------------------------
  tag-on-merge:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        id: tag
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed tag $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build platform binaries on native runners. Triggered by either:
  #   (a) PR-merge path: chained after tag-on-merge in the same run
  #   (b) Tag-push path: developer manually pushes a vX.Y.Z tag from their
  #       machine (recovery / hotfix).
  # ---------------------------------------------------------------------------
  build:
    needs: [tag-on-merge]
    if: |
      !cancelled() &&
      (
        needs.tag-on-merge.result == 'success' ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      )
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=refs/tags/${{ needs.tag-on-merge.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun run script/build.ts --target ${{ matrix.target }}

      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: kajji-${{ matrix.target }}
          path: dist/kajji-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Gather all artifacts, publish to npm, create GH release. Same dual-trigger
  # logic as `build`.
  # ---------------------------------------------------------------------------
  publish:
    needs: [tag-on-merge, build]
    if: |
      !cancelled() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=refs/tags/${{ needs.tag-on-merge.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Reassemble dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          for dir in artifacts/kajji-*; do
            target=$(basename "$dir")
            mkdir -p "dist/$target"
            cp -r "$dir"/. "dist/$target"/
            chmod +x "dist/$target/bin/kajji" || true
          done
          ls -la dist/

      - name: Verify checkout matches expected version
        run: |
          set -euo pipefail
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            EXPECTED="${GITHUB_REF#refs/tags/v}"
          else
            EXPECTED="${{ needs.tag-on-merge.outputs.version }}"
          fi
          if [[ "$EXPECTED" != "$PKG_VERSION" ]]; then
            echo "::error::Expected v$EXPECTED but package.json is $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SKIP_BUILD: "1"
        run: bun run script/publish.ts --skip-build

      - name: Extract release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          bun run script/extract-release-notes.ts "$VERSION" > /tmp/release-notes.md
          echo "::group::Release notes"
          cat /tmp/release-notes.md
          echo "::endgroup::"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.notes.outputs.version }}
          name: v${{ steps.notes.outputs.version }}
          body_path: /tmp/release-notes.md
          prerelease: false
          files: |
            dist/kajji-darwin-arm64.zip
            dist/kajji-darwin-x64.zip
            dist/kajji-linux-x64.tar.gz
            dist/kajji-linux-arm64.tar.gz
